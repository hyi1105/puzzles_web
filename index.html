<!DOCTYPE html> <html lang="zh-Hant"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0">     <title>AI Sync | Clay Garden Style</title>     <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;400&display=swap" rel="stylesheet">     <style>         body { background-color: #f8f6f1; color: #5a554f; font-family: 'Noto Serif TC', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }         .card { background: #fff; padding: 60px; width: 100%; max-width: 400px; box-shadow: 0 4px 25px rgba(0,0,0,0.02); border-radius: 4px; text-align: center; }         h1 { font-weight: 200; font-size: 24px; margin-bottom: 50px; letter-spacing: 0.2em; color: #333; }         .input-item { text-align: left; margin-bottom: 30px; }         .label { font-size: 10px; color: #ccc; display: block; margin-bottom: 8px; text-transform: uppercase; }         input { width: 100%; border: none; border-bottom: 1px solid #eee; padding: 10px 0; font-family: inherit; font-size: 16px; outline: none; background: transparent; color: #5a554f; }         input:focus { border-bottom-color: #a89f91; }         button { width: 100%; border: 1px solid #a89f91; background: none; padding: 15px; cursor: pointer; font-family: inherit; letter-spacing: 0.4em; transition: 0.4s; margin-top: 20px; color: #5a554f; }         button:hover { background: #5a554f; color: #fff; }         #status { font-size: 12px; margin-top: 20px; color: #a89f91; opacity: 0; }     </style> </head> <body>     <div class="card">         <h1>AI 案卷登錄</h1>         <div class="input-item">             <span class="label">姓名 Name</span>             <input type="text" id="name" placeholder="請輸入姓名">         </div>         <div class="input-item">             <span class="label">電話 Phone</span>             <input type="text" id="phone" placeholder="請輸入聯絡電話">         </div>         <button onclick="alert('座標連結中，請稍後填入 Google 表單 ID')">SUBMIT</button>         <div id="status">正在傳遞奏摺...</div>     </div> </body> </html>
