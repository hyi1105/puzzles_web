<!DOCTYPE html> <html lang="zh-Hant"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0">     <title>Clay Garden | Survey Architect</title>     <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;400&display=swap" rel="stylesheet">     <style>         :root { --bg: #f8f6f1; --text: #5a554f; --accent: #a89f91; --white: #fff; }         body { background-color: var(--bg); color: var(--text); font-family: 'Noto Serif TC', serif; margin: 0; padding: 40px 20px; letter-spacing: 0.1em; }         .container { max-width: 700px; margin: 0 auto; background: var(--white); padding: 60px 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); min-height: 80vh; position: relative; }                  /* 編輯器控制台 */         .admin-box { background: #fdfdfd; border: 1px dashed var(--accent); padding: 25px; margin-bottom: 50px; border-radius: 4px; transition: 0.5s; }         .admin-box.hidden { display: none; }         .admin-label { font-size: 10px; color: var(--accent); margin-bottom: 15px; display: block; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; }         .row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }         input, select { border: 1px solid #eee; padding: 10px; font-family: inherit; color: var(--text); outline: none; flex: 1; }         .btn-add { background: var(--text); color: white; border: none; padding: 10px 25px; cursor: pointer; font-size: 13px; }         .btn-publish { background: #5a554f; color: white; border: none; width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; letter-spacing: 0.5em; }          /* 問卷本體風格 */         h1 { font-weight: 200; font-size: 28px; text-align: center; margin-bottom: 60px; color: #333; }         .field-group { margin-bottom: 40px; border-left: 2px solid #f2efea; padding-left: 25px; position: relative; }         .field-label { font-size: 12px; color: #aaa; margin-bottom: 12px; display: block; }         .input-u { width: 100%; border: none; border-bottom: 1px solid #eee; padding: 10px 0; background: transparent; font-family: inherit; font-size: 16px; color: var(--text); }         .input-u:focus { border-bottom-color: var(--accent); }                  /* 選項類屬性 */         .opt-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; font-size: 14px; }         .delete-ico { position: absolute; right: 0; top: 0; color: #ddd; cursor: pointer; font-size: 12px; transition: 0.3s; }         .delete-ico:hover { color: #b33e3e; }          .footer-btns { margin-top: 60px; text-align: center; }         .submit-final { border: 1px solid var(--accent); background: none; padding: 15px 60px; cursor: pointer; font-family: inherit; letter-spacing: 0.3em; transition: 0.4s; }         .submit-final:hover { background: var(--text); color: white; }                  #editModeBtn { position: fixed; bottom: 20px; right: 20px; font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: underline; }     </style> </head> <body>  <div class="container">     <div class="admin-box" id="panel">         <span class="admin-label">問卷工法台 (Architect Console)</span>         <div class="row">             <input type="text" id="fName" placeholder="項目名稱 (如：您喜愛的茶類)">             <select id="fType">                 <option value="text">單行文字 (Short Text)</option>                 <option value="textarea">多行描述 (Long Text)</option>                 <option value="date">日期 (Date)</option>                 <option value="number">數量 (Number)</option>                 <option value="radio">單選項目 (Radio)</option>             </select>         </div>         <div class="row" id="optArea" style="display:none;">             <input type="text" id="fOpts" placeholder="選項 (用逗號隔開，如：紅茶,綠茶,烏龍)">         </div>         <button class="btn-add" onclick="saveField()">加入此項目</button>         <button class="btn-publish" onclick="toggleMode(true)">發布並產生問卷</button>     </div>      <div id="surveyMain">         <h1 contenteditable="true" id="surveyTitle">請點擊此處修改標題</h1>         <div id="fieldsBody">             </div>         <div class="footer-btns">             <button class="submit-final" onclick="submitData()">送出奏摺</button>         </div>     </div> </div>  <div id="editModeBtn" onclick="toggleMode(false)">返回設計模式</div>  <script>     let fields = JSON.parse(localStorage.getItem('mySurveyFields')) || [];      // 切換下拉選單顯示選項輸入     document.getElementById('fType').addEventListener('change', function() {         document.getElementById('optArea').style.display = (this.value === 'radio') ? 'block' : 'none';     });      function saveField() {         const name = document.getElementById('fName').value;         const type = document.getElementById('fType').value;         const opts = document.getElementById('fOpts').value;                  if(!name) return;                  fields.push({ id: Date.now(), name, type, opts });         renderFields();         localStorage.setItem('mySurveyFields', JSON.stringify(fields));         document.getElementById('fName').value = '';     }      function renderFields() {         const container = document.getElementById('fieldsBody');         container.innerHTML = '';         fields.forEach(f => {             const div = document.createElement('div');             div.className = 'field-group';             let inputHtml = '';                          if(f.type === 'radio') {                 const optList = f.opts.split(',');                 optList.forEach(o => {                     inputHtml += `<div class="opt-row"><input type="radio" name="r_${f.id}"> ${o.trim()}</div>`;                 });             } else if (f.type === 'textarea') {                 inputHtml = `<textarea class="input-u" rows="3"></textarea>`;             } else {                 inputHtml = `<input type="${f.type}" class="input-u" placeholder="請填寫">`;             }              div.innerHTML = `                 <span class="delete-ico" onclick="deleteField(${f.id})">[ 撤回 ]</span>                 <span class="field-label">${f.name}</span>                 ${inputHtml}             `;             container.appendChild(div);         });     }      function deleteField(id) {         fields = fields.filter(f => f.id !== id);         localStorage.setItem('mySurveyFields', JSON.stringify(fields));         renderFields();     }      function toggleMode(isPublish) {         document.getElementById('panel').classList.toggle('hidden', isPublish);         document.querySelectorAll('.delete-ico').forEach(el => el.style.display = isPublish ? 'none' : 'block');     }      function submitData() {         alert('皇上聖明！資料已模擬儲存至雲端。 (目前暫存於您的瀏覽器中)');     }      // 初始化渲染     renderFields(); </script>  </body> </html>
