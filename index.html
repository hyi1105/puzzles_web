<!DOCTYPE html> <html lang="zh-Hant"> <head>     <meta charset="UTF-8">     <title>Clay Garden Style Approval</title>     <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300&display=swap" rel="stylesheet">     <style>         body { background-color: #f9f7f2; color: #4a4a4a; font-family: 'Noto Serif TC', serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; letter-spacing: 0.1em; }         .card { background: #fff; padding: 60px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); text-align: center; max-width: 450px; position: relative; border: 1px solid #eee; }         h1 { font-weight: 300; font-size: 22px; margin-bottom: 40px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; color: #333; }         .content { text-align: left; line-height: 2.5; margin-bottom: 40px; font-size: 15px; border-left: 2px solid #e0dbd1; padding-left: 20px; }         .label { color: #aaa; font-size: 11px; display: block; }         .btn-group { display: flex; gap: 20px; justify-content: center; }         .btn { background: none; border: 1px solid #4a4a4a; padding: 12px 35px; cursor: pointer; transition: 0.4s; color: #4a4a4a; font-family: inherit; font-size: 13px; }         .btn:hover { background: #4a4a4a; color: #fff; letter-spacing: 0.2em; }         #stamp { position: absolute; top: 15%; right: 10%; border: 3px solid #c0392b; color: #c0392b; padding: 10px; font-weight: bold; transform: rotate(15deg) scale(2); opacity: 0; transition: 0.5s; pointer-events: none; }     </style> </head> <body>     <div class="card">         <div id="stamp">准 奏</div>         <h1>雲端奏摺簽核</h1>         <div class="content">             <span class="label">案由</span>日系極簡美學複刻<br>             <span class="label">呈報人</span>秘書 養龍蝦         </div>         <div class="btn-group">             <button class="btn" onclick="alert('領旨重擬')">Reject</button>             <button class="btn" onclick="approve()">Approve</button>         </div>     </div>     <script>         function approve() {             const s = document.getElementById('stamp');             s.style.opacity = '0.7'; s.style.transform = 'rotate(15deg) scale(1)';             setTimeout(() => { alert('美學升級完成。'); }, 500);         }     </script> </body> </html>
