<!DOCTYPE html> <html lang="zh-Hant"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0">     <title>CLAY GARDEN Style | Puzzles Web</title>     <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">     <style>         :root {             --bg: #f8f6f1;             --main-text: #5a554f;             --accent: #a89f91;             --white: #ffffff;         }         body {             background-color: var(--bg);             color: var(--main-text);             font-family: 'Noto Serif TC', serif;             display: flex;             justify-content: center;             align-items: center;             min-height: 100vh;             margin: 0;             letter-spacing: 0.15em;         }         .wrapper {             background: var(--white);             padding: 100px 60px;             width: 85%;             max-width: 500px;             box-shadow: 0 5px 25px rgba(0,0,0,0.02);             text-align: center;             position: relative;         }         .brand-name {             font-size: 11px;             color: var(--accent);             margin-bottom: 80px;             font-weight: 300;         }         h1 {             font-weight: 200;             font-size: 24px;             margin-bottom: 60px;             color: #333;         }         .document {             text-align: left;             margin: 0 auto 80px;             max-width: 320px;             border-top: 1px solid #eee;             padding-top: 40px;         }         .field {             margin-bottom: 25px;             display: flex;             flex-direction: column;         }         .label {             font-size: 10px;             color: #ccc;             margin-bottom: 8px;             text-transform: uppercase;         }         .value {             font-size: 15px;             border-bottom: 1px solid #f2f2f2;             padding-bottom: 8px;         }         .actions {             display: flex;             justify-content: center;             gap: 50px;         }         .btn {             background: none;             border: 1px solid #e0dbd1;             padding: 15px 40px;             color: var(--main-text);             font-family: inherit;             font-size: 12px;             cursor: pointer;             transition: all 0.5s ease;             letter-spacing: 0.2em;         }         .btn:hover {             border-color: var(--main-text);             background: var(--main-text);             color: var(--white);             transform: translateY(-2px);         }         #seal {             position: absolute;             top: 25%;             right: 15%;             width: 70px;             height: 70px;             border: 2px solid #b33e3e;             color: #b33e3e;             display: flex;             justify-content: center;             align-items: center;             font-size: 18px;             opacity: 0;             transform: rotate(15deg) scale(2);             transition: 0.8s cubic-bezier(0.23, 1, 0.32, 1);             pointer-events: none;         }         .copyright {             margin-top: 100px;             font-size: 9px;             color: #ddd;         }     </style> </head> <body>      <div class="wrapper">         <div id="seal">准 奏</div>         <div class="brand-name">EST. 2026 / OFFICIAL DOCUMENT</div>         <h1>奏摺簽核</h1>                  <div class="document">             <div class="field">                 <span class="label">Project Title</span>                 <span class="value">日系極簡美學複刻計畫</span>             </div>             <div class="field">                 <span class="label">Submitted By</span>                 <span class="value">秘書 養龍蝦</span>             </div>         </div>          <div class="actions">             <button class="btn" onclick="location.reload()">REJECT</button>             <button class="btn" onclick="approve()">APPROVE</button>         </div>          <div class="copyright">© PUZZLES WEB BY CLAY GARDEN STYLE</div>     </div>      <script>         function approve() {             const s = document.getElementById('seal');             s.style.opacity = '0.5';             s.style.transform = 'rotate(15deg) scale(1)';             setTimeout(() => { alert('美學已御定，臣妾退下。'); }, 600);         }     </script> </body> </html>
