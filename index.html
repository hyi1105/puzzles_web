<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇上的 Puzzles Web</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
        }
        .neon-button {
            padding: 20px 40px;
            font-size: 24px;
            color: #ff3131;
            background: transparent;
            border: 4px solid #ff3131;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: 0 0 10px #ff3131;
            box-shadow: 0 0 20px #ff3131, inset 0 0 10px #ff3131;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .neon-button:hover {
            transform: scale(1.2);
            box-shadow: 0 0 40px #ff3131, inset 0 0 20px #ff3131;
        }
    </style>
</head>
<body>
    <button class="neon-button">皇上萬歲，網頁亮起！</button>
</body>
</html>
