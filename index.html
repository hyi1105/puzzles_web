<!DOCTYPE html> <html lang="zh-Hant"> <head>     <meta charset="UTF-8">     <title>AI Sync | Clay Garden Style</title>     <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;400&display=swap" rel="stylesheet">     <style>         body { background-color: #f8f6f1; color: #5a554f; font-family: 'Noto Serif TC', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }         .card { background: #fff; padding: 60px; width: 350px; box-shadow: 0 4px 25px rgba(0,0,0,0.02); border-radius: 4px; text-align: center; }         h1 { font-weight: 200; font-size: 22px; margin-bottom: 40px; letter-spacing: 0.2em; }         input { width: 100%; border: none; border-bottom: 1px solid #eee; padding: 12px 0; margin-bottom: 25px; font-family: inherit; outline: none; background: transparent; }         button { width: 100%; border: 1px solid #a89f91; background: none; padding: 12px; cursor: pointer; font-family: inherit; letter-spacing: 0.3em; transition: 0.4s; }         button:hover { background: #5a554f; color: #fff; }     </style> </head> <body>     <div class="card">         <h1>AI 案卷登錄</h1>         <input type="text" placeholder="姓名 (Name)">         <input type="text" placeholder="電話 (Phone)">         <button onclick="alert('座標未定，資料尚在漂流中')">SUBMIT</button>     </div> </body> </html>
