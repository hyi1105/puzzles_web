<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇上的雲端簽核系統</title>
    <style>
        :root { --neon-red: #ff3131; --neon-green: #39ff14; }
        body { background-color: #0d0d0d; color: #ffffff; font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 0 50px rgba(0,0,0,0.8); max-width: 450px; position: relative; z-index: 2; }
        h1 { font-size: 32px; color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); margin-bottom: 30px; }
        .info-box { text-align: left; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; border-left: 5px solid var(--neon-green); margin-bottom: 30px; }
        .info-item { margin: 15px 0; font-size: 18px; }
        .label { color: #888; font-size: 12px; text-transform: uppercase; }
        .btn-group { display: flex; gap: 20px; }
        .neon-btn { flex: 1; padding: 15px; font-size: 20px; background: transparent; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-approve { color: var(--neon-green); border: 2px solid var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
        .btn-approve:hover { background: var(--neon-green); color: black; transform: scale(1.1); }
        .btn-reject { color: var(--neon-red); border: 2px solid var(--neon-red); box-shadow: 0 0 15px var(--neon-red); }
        .btn-reject:hover { background: var(--neon-red); color: white; transform: scale(1.1); }
        #status-stamp { position: absolute; font-size: 80px; font-weight: 900; color: var(--neon-green); border: 10px double var(--neon-green); padding: 10px 40px; transform: rotate(-25deg) scale(3); opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; top: 30%; left: 15%; }
    </style>
</head>
<body>
    <div id="status-stamp">准 奏</div>
    <div class="container">
        <h1>御用簽核系統</h1>
        <div class="info-box">
            <div class="label">奏摺案由</div>
            <div class="info-item">關於「雲端行宮自動化」之擴建案</div>
            <div class="label">呈奏人</div>
            <div class="info-item">秘書 養龍蝦</div>
        </div>
        <div class="btn-group">
            <button class="neon-btn btn-reject" onclick="alert('皇上恕罪，臣妾領旨重擬！')">駁回</button>
            <button class="neon-btn btn-approve" onclick="approve()">准奏</button>
        </div>
    </div>
    <script>
        function approve() {
            const stamp = document.getElementById('status-stamp');
            stamp.style.opacity = '0.9';
            stamp.style.transform = 'rotate(-25deg) scale(1)';
            document.querySelector('.container').style.filter = 'grayscale(0.5) blur(2px)';
            setTimeout(() => { alert('皇上聖明！御旨已傳達雲端。'); }, 600);
        }
    </script>
</body>
</html>
