name: Gemini Auto Update
on:
  workflow_dispatch:
    inputs:
      content:
        description: 'New HTML Content'
        required: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Overwrite index.html
        run: |
          # 建立一個乾淨的 index.html
          printf "%s" "${{ github.event.inputs.content }}" > index.html
          
          # 強制身分驗證並推送
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "皇上御筆親改：風格翻新" || echo "No changes to commit"
          git push origin main
