name: Gemini Data Logger
on:
  workflow_dispatch:
    inputs:
      action_type:
        description: 'Update Code or Log Data'
        required: true
        default: 'update'
      content:
        description: 'Content to save'
        required: true
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Save Content
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          if [ "${{ github.event.inputs.action_type }}" == "log" ]; then
            # 如果是存資料，就追加到 data.csv
            echo "${{ github.event.inputs.content }}" >> data.csv
            git add data.csv
            git commit -m "收到新奏摺 (Data Log)"
          else
            # 如果是更換網頁代碼，就覆蓋 index.html
            echo '${{ github.event.inputs.content }}' > index.html
            git add index.html
            git commit -m "介面翻新"
          fi
          git push
