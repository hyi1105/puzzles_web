name: Gemini Auto Update
on:
  workflow_dispatch:
    inputs:
      content:
        description: 'New HTML Content'
        required: true
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update index.html
        run: |
          echo "${{ github.event.inputs.content }}" > index.html
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "皇上聖旨：更新介面"
          git push
