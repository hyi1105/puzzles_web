name: Gemini Auto Update
on:
  workflow_dispatch:
    inputs:
      content:
        description: 'New HTML Content'
        required: true
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Overwrite index.html
        env:
          HTML_CONTENT: ${{ github.event.inputs.content }}
        run: |
          git config --global user.email "hyi1105@users.noreply.github.com"
          git config --global user.name "hyi1105"
          
          # 使用環境變數寫入，徹底避開 shell 的引號問題
          echo "$HTML_CONTENT" > index.html
          
          git add index.html
          git commit -m "皇上御筆：日系工藝翻新" || echo "No changes to commit"
          git push
